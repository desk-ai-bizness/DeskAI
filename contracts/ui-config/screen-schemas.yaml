$schema: https://json-schema.org/draft/2020-12/schema
title: UiConfigScreenSchema
description: Screen configuration schemas for backend-driven UI layout.

type: object
required: [version, locale, review_screen]
properties:
  version:
    type: string
  locale:
    type: string
    const: pt-BR
  review_screen:
    type: object
    required: [section_order, sections]
    properties:
      section_order:
        type: array
        items:
          type: string
          enum: [transcript, medical_history, summary, insights]
        minItems: 1
        uniqueItems: true
      sections:
        type: object
        required: [transcript, medical_history, summary, insights]
        properties:
          transcript:
            $ref: "#/$defs/SectionConfig"
          medical_history:
            $ref: "#/$defs/SectionConfig"
          summary:
            $ref: "#/$defs/SectionConfig"
          insights:
            $ref: "#/$defs/SectionConfig"
        additionalProperties: false
    additionalProperties: false
additionalProperties: false

$defs:
  SectionConfig:
    type: object
    required: [title, editable, visible]
    properties:
      title:
        type: string
      editable:
        type: boolean
      visible:
        type: boolean
    additionalProperties: false
