name: App CI

on:
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'
  push:
    branches: [main]
    paths:
      - 'app/**'

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        working-directory: app
        run: npm install
      - name: Lint
        working-directory: app
        run: npm run lint
      - name: Typecheck
        working-directory: app
        run: npm run typecheck
      - name: Build
        working-directory: app
        run: npm run build
