name: Contracts CI

on:
  pull_request:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts-ci.yml'
  push:
    branches: [main]
    paths:
      - 'contracts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install linter
        run: npm install -g @stoplight/spectral-cli
      - name: Lint HTTP contracts
        run: spectral lint contracts/http/*.yaml --ruleset contracts/.spectral.yaml
      - name: Validate YAML syntax
        run: |
          npm install -g yaml-lint
          yamllint 'contracts/**/*.yaml'
