name: Backend CI

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend-ci.yml'

  backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        working-directory: backend
        run: make lint
      - name: Test
        working-directory: backend
        run: make test

  backend-gate:
    if: always()
    needs: [backend]
    runs-on: ubuntu-latest
    steps:
      - name: Check backend result
        run: |
          if [[ "${{ needs.backend.result }}" == "failure" ]]; then
            echo "Backend CI failed"
            exit 1
          fi
          echo "Backend CI passed or was skipped"
