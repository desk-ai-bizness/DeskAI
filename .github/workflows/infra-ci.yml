name: Infra CI

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/infra-ci.yml'
  push:
    branches: [main]
    paths:
      - 'infra/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
              - '.github/workflows/infra-ci.yml'

  infra:
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install infra
        working-directory: infra
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          npm ci
      - name: Lint
        working-directory: infra
        run: |
          . .venv/bin/activate
          make lint
      - name: Test
        working-directory: infra
        run: |
          . .venv/bin/activate
          make test
      - name: Synth
        working-directory: infra
        run: |
          . .venv/bin/activate
          make synth

  infra-gate:
    if: always()
    needs: [infra]
    runs-on: ubuntu-latest
    steps:
      - name: Check infra result
        run: |
          if [[ "${{ needs.infra.result }}" == "failure" ]]; then
            echo "Infra CI failed"
            exit 1
          fi
          echo "Infra CI passed or was skipped"
