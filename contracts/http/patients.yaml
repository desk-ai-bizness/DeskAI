openapi: "3.1.0"
info:
  title: DeskAI Patients API
  version: v1

paths:
  /v1/patients:
    post:
      operationId: createPatient
      summary: Register a new patient in the clinic
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientRequest"
      responses:
        "201":
          description: Patient created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientView"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
        "403":
          description: Not authorized to create patients
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
        "409":
          description: Patient CPF already exists in clinic
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
        "503":
          description: Service temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
    get:
      operationId: listPatients
      summary: List patients with optional search filter
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Free-text search filter on patient name or CPF digits/punctuation
      responses:
        "200":
          description: Patient list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientListView"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
        "403":
          description: Not authorized to list patients
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
        "503":
          description: Service temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"

  /v1/patients/{patient_id}:
    get:
      operationId: getPatient
      summary: Get patient detail with current-doctor consultation history
      security:
        - bearerAuth: []
      parameters:
        - name: patient_id
          in: path
          required: true
          schema:
            type: string
          description: Patient identifier within the current clinic
      responses:
        "200":
          description: Patient detail and authorized history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientDetailView"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
        "403":
          description: Not authorized to view patient detail
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
        "404":
          description: Patient not found in the current clinic
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
        "503":
          description: Service temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreatePatientRequest:
      type: object
      required: [name, cpf]
      properties:
        name:
          type: string
        cpf:
          type: string
          description: CPF in digits-only or punctuated format. The backend stores normalized digits.
        date_of_birth:
          anyOf:
            - type: string
              format: date
            - type: "null"
      additionalProperties: false

    PatientView:
      type: object
      required: [patient_id, name, cpf, date_of_birth, clinic_id, created_at]
      properties:
        patient_id:
          type: string
          format: uuid
        name:
          type: string
        cpf:
          type: string
          description: Masked CPF for display.
          pattern: '^[0-9]{3}\.\*\*\*\.\*\*\*-[0-9]{2}$'
        date_of_birth:
          anyOf:
            - type: string
              format: date
            - type: "null"
        clinic_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
      additionalProperties: false

    PatientHistoryItemView:
      type: object
      required: [consultation_id, status, scheduled_date, finalized_at, preview]
      properties:
        consultation_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - started
            - recording
            - in_processing
            - processing_failed
            - draft_generated
            - under_physician_review
            - finalized
        scheduled_date:
          type: string
          format: date
        finalized_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        preview:
          anyOf:
            - type: object
              properties:
                summary:
                  type: string
              additionalProperties: false
            - type: "null"
      additionalProperties: false

    PatientDetailView:
      type: object
      required: [patient, history]
      properties:
        patient:
          $ref: "#/components/schemas/PatientView"
        history:
          type: array
          items:
            $ref: "#/components/schemas/PatientHistoryItemView"
      additionalProperties: false

    PatientListView:
      type: object
      required: [patients]
      properties:
        patients:
          type: array
          items:
            $ref: "#/components/schemas/PatientView"
      additionalProperties: false
