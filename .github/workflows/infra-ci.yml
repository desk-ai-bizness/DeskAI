name: Infra CI

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/infra-ci.yml'
  push:
    branches: [main]
    paths:
      - 'infra/**'

jobs:
  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install infra
        working-directory: infra
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          npm ci
      - name: Lint
        working-directory: infra
        run: |
          . .venv/bin/activate
          make lint
      - name: Synth
        working-directory: infra
        run: |
          . .venv/bin/activate
          make synth
