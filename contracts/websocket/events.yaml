$schema: https://json-schema.org/draft/2020-12/schema
title: SessionServerEvent
description: Server-to-client WebSocket events for session management.

type: object
required: [event, data, event_version]
properties:
  event:
    type: string
    enum:
      - transcript.partial
      - transcript.final
      - session.status
      - session.warning
      - session.ended
      - server.pong
      - insight.provisional
      - autofill.candidate
  data:
    type: object
  event_version:
    type: string
    default: "2"
    description: Schema version for the event payload.

allOf:
  - if:
      properties:
        event:
          const: transcript.partial
    then:
      properties:
        data:
          type: object
          required: [text, speaker, is_final, start_time, end_time, confidence]
          properties:
            text:
              type: string
            speaker:
              type: string
              enum: [doctor, patient, unknown]
            is_final:
              type: boolean
              const: false
            start_time:
              type: number
              minimum: 0
            end_time:
              type: number
              minimum: 0
            confidence:
              type: number
              minimum: 0
              maximum: 1
          additionalProperties: false

  - if:
      properties:
        event:
          const: transcript.final
    then:
      properties:
        data:
          type: object
          required: [text, speaker, is_final, start_time, end_time, confidence]
          properties:
            text:
              type: string
            speaker:
              type: string
              enum: [doctor, patient, unknown]
            is_final:
              type: boolean
              const: true
            start_time:
              type: number
              minimum: 0
            end_time:
              type: number
              minimum: 0
            confidence:
              type: number
              minimum: 0
              maximum: 1
          additionalProperties: false

  - if:
      properties:
        event:
          const: session.status
    then:
      properties:
        data:
          type: object
          required: [status, message]
          properties:
            status:
              type: string
              enum: [connected, recording, paused, processing, error]
            message:
              type: string
          additionalProperties: false

  - if:
      properties:
        event:
          const: session.warning
    then:
      properties:
        data:
          type: object
          required: [type, remaining_minutes, message]
          properties:
            type:
              type: string
              const: duration_limit_approaching
            remaining_minutes:
              type: integer
              minimum: 0
            message:
              type: string
          additionalProperties: false

  - if:
      properties:
        event:
          const: session.ended
    then:
      properties:
        data:
          type: object
          required: [reason, message]
          properties:
            reason:
              type: string
              enum: [duration_limit, grace_period_expired, manual]
            message:
              type: string
          additionalProperties: false

  - if:
      properties:
        event:
          const: server.pong
    then:
      properties:
        data:
          type: object
          required: [timestamp]
          properties:
            timestamp:
              type: string
              format: date-time
          additionalProperties: false

  - if:
      properties:
        event:
          const: insight.provisional
    then:
      properties:
        data:
          type: object
          required: [insight_id, category, text, severity, evidence_excerpt, is_draft]
          properties:
            insight_id:
              type: string
              format: uuid
            category:
              type: string
              enum: [documentation_gap, consistency_issue, clinical_attention]
            text:
              type: string
            severity:
              type: string
              enum: [informative, moderate, important]
            evidence_excerpt:
              type: string
            is_draft:
              type: boolean
              const: true
          additionalProperties: false

  - if:
      properties:
        event:
          const: autofill.candidate
    then:
      properties:
        data:
          type: object
          required: [field_key, candidate_value, evidence_excerpt, confidence]
          properties:
            field_key:
              type: string
            candidate_value:
              type: string
            evidence_excerpt:
              type: string
            confidence:
              type: number
              minimum: 0
              maximum: 1
          additionalProperties: false

additionalProperties: false
