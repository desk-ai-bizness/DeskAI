$schema: https://json-schema.org/draft/2020-12/schema
title: SessionClientMessage
description: Client-to-server WebSocket messages for session management.

type: object
required: [action, data]
properties:
  action:
    type: string
    enum: [session.init, transcript.commit, session.pause, session.resume, session.stop, client.ping]
  data:
    type: object

allOf:
  - if:
      properties:
        action:
          const: session.init
    then:
      properties:
        data:
          type: object
          required: [consultation_id, session_id]
          properties:
            consultation_id:
              type: string
              format: uuid
            session_id:
              type: string
              format: uuid
          additionalProperties: false
  - if:
      properties:
        action:
          const: transcript.commit
    then:
      properties:
        data:
          type: object
          required: [consultation_id, segments, timestamp]
          properties:
            consultation_id:
              type: string
              format: uuid
            segments:
              type: array
              items:
                type: object
                required: [speaker, text, start_time, end_time, confidence, is_final]
                properties:
                  speaker:
                    type: string
                    enum: [doctor, patient, unknown]
                  text:
                    type: string
                  start_time:
                    type: number
                    minimum: 0
                  end_time:
                    type: number
                    minimum: 0
                  confidence:
                    type: number
                    minimum: 0
                    maximum: 1
                  is_final:
                    type: boolean
                additionalProperties: false
            timestamp:
              type: string
              format: date-time
          additionalProperties: false
  - if:
      properties:
        action:
          const: session.pause
    then:
      properties:
        data:
          type: object
          required: [consultation_id, timestamp]
          properties:
            consultation_id:
              type: string
              format: uuid
            timestamp:
              type: string
              format: date-time
          additionalProperties: false
  - if:
      properties:
        action:
          const: session.resume
    then:
      properties:
        data:
          type: object
          required: [consultation_id, timestamp]
          properties:
            consultation_id:
              type: string
              format: uuid
            timestamp:
              type: string
              format: date-time
          additionalProperties: false
  - if:
      properties:
        action:
          const: session.stop
    then:
      properties:
        data:
          type: object
          required: [consultation_id]
          properties:
            consultation_id:
              type: string
              format: uuid
          additionalProperties: false
  - if:
      properties:
        action:
          const: client.ping
    then:
      properties:
        data:
          type: object
          required: [timestamp]
          properties:
            timestamp:
              type: string
              format: date-time
          additionalProperties: false

additionalProperties: false

$defs:
  ConnectAuth:
    title: WebSocket $connect Authentication
    description: >
      Authentication schema for the WebSocket $connect route. The client must
      include a valid connection_token as a query-string parameter when opening
      the WebSocket connection.
    type: object
    required: [token]
    properties:
      token:
        type: string
        description: >
          The connection_token returned by POST /v1/consultations/{id}/session/start.
          Passed as a query-string parameter: wss://...?token=<value>
    additionalProperties: false
