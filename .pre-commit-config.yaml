repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (lint + autofix)
        entry: ruff check --fix --force-exclude
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: ruff format --force-exclude
        language: system
        types: [python]
