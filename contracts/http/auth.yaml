openapi: "3.1.0"
info:
  title: DeskAI Auth API
  version: v1

paths:
  /v1/auth/session:
    post:
      operationId: createAuthSession
      summary: Authenticate with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials or unverified account
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAuthSession
      summary: Sign out the current user
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Signed out successfully
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"

  /v1/auth/forgot-password:
    post:
      operationId: forgotPassword
      summary: Initiate password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset initiated (always succeeds to avoid email enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericMessageResponse"

  /v1/auth/confirm-forgot-password:
    post:
      operationId: confirmForgotPassword
      summary: Complete password reset with confirmation code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmForgotPasswordRequest"
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericMessageResponse"
        "401":
          description: Invalid or expired confirmation code
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"

  /v1/me:
    get:
      operationId: getCurrentUser
      summary: Get authenticated doctor profile and entitlements
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile and entitlements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileView"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"
        "403":
          description: No doctor profile found
          content:
            application/json:
              schema:
                $ref: "errors.yaml#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    TokenResponse:
      type: object
      required: [access_token, refresh_token, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ConfirmForgotPasswordRequest:
      type: object
      required: [email, confirmation_code, new_password]
      properties:
        email:
          type: string
          format: email
        confirmation_code:
          type: string
        new_password:
          type: string
          format: password

    GenericMessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    UserProfileView:
      type: object
      required: [user, entitlements]
      properties:
        user:
          type: object
          required:
            - doctor_id
            - name
            - email
            - plan_type
            - clinic_id
            - clinic_name
          properties:
            doctor_id:
              type: string
              format: uuid
            name:
              type: string
            email:
              type: string
              format: email
            plan_type:
              type: string
              enum: [free_trial, plus, pro]
            clinic_id:
              type: string
              format: uuid
            clinic_name:
              type: string
        entitlements:
          type: object
          required:
            - can_create_consultation
            - consultations_remaining
            - consultations_used_this_month
            - max_duration_minutes
            - export_enabled
            - trial_expired
            - trial_days_remaining
          properties:
            can_create_consultation:
              type: boolean
            consultations_remaining:
              type: integer
            consultations_used_this_month:
              type: integer
            max_duration_minutes:
              type: integer
            export_enabled:
              type: boolean
            trial_expired:
              type: boolean
            trial_days_remaining:
              type: integer
              nullable: true
