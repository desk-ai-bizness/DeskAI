$schema: https://json-schema.org/draft/2020-12/schema
title: FeatureFlagsSchema
description: Feature flag definitions with plan-type overrides.

type: object
required: [flags]
properties:
  flags:
    type: object
    additionalProperties:
      type: object
      required: [type, default]
      properties:
        type:
          type: string
          enum: [boolean, integer, string]
        default:
          oneOf:
            - type: boolean
            - type: integer
            - type: string
        overrides:
          type: object
          description: Plan-specific override values. Keys must be valid plan types.
          properties:
            free_trial:
              oneOf:
                - type: boolean
                - type: integer
                - type: string
            plus:
              oneOf:
                - type: boolean
                - type: integer
                - type: string
            pro:
              oneOf:
                - type: boolean
                - type: integer
                - type: string
          additionalProperties: false
      additionalProperties: false
additionalProperties: false
