$schema: https://json-schema.org/draft/2020-12/schema
$title: FeatureFlagsSchema
$type: object
required:
  - flags
properties:
  flags:
    type: object
    additionalProperties:
      type: object
      required:
        - type
        - default
      properties:
        type:
          type: string
          enum: [boolean, integer, string]
        default:
          oneOf:
            - type: boolean
            - type: integer
            - type: string
