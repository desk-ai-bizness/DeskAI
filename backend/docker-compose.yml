services:
  llm:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      # Ensure uv installs into the system Python inside the container
      UV_SYSTEM_PYTHON: "1"
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"
