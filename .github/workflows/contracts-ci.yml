name: Contracts CI

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'contracts/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            contracts:
              - 'contracts/**'
              - '.github/workflows/contracts-ci.yml'

  validate:
    needs: detect-changes
    if: needs.detect-changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install linter
        run: npm install -g @stoplight/spectral-cli
      - name: Lint HTTP contracts
        run: spectral lint contracts/http/*.yaml --ruleset contracts/.spectral.yaml
      - name: Validate YAML syntax
        run: |
          npm install -g yaml-lint
          yamllint 'contracts/**/*.yaml'

  contracts-gate:
    if: always()
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - name: Check contracts result
        run: |
          if [[ "${{ needs.validate.result }}" == "failure" ]]; then
            echo "Contracts CI failed"
            exit 1
          fi
          echo "Contracts CI passed or was skipped"
