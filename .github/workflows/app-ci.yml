name: App CI

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'app/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
              - '.github/workflows/app-ci.yml'

  app:
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install
        working-directory: app
        run: npm install
      - name: Lint
        working-directory: app
        run: npm run lint
      - name: Typecheck
        working-directory: app
        run: npm run typecheck
      - name: Test
        working-directory: app
        run: npx vitest run --passWithNoTests
      - name: Build
        working-directory: app
        run: npm run build

  app-gate:
    if: always()
    needs: [app]
    runs-on: ubuntu-latest
    steps:
      - name: Check app result
        run: |
          if [[ "${{ needs.app.result }}" == "failure" ]]; then
            echo "App CI failed"
            exit 1
          fi
          echo "App CI passed or was skipped"
