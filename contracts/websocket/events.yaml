$schema: https://json-schema.org/draft/2020-12/schema
title: SessionServerEvent
description: Server-to-client WebSocket events for audio session management.

type: object
required: [event, data]
properties:
  event:
    type: string
    enum:
      - transcript.partial
      - transcript.final
      - session.status
      - session.warning
      - session.ended
      - server.pong
  data:
    type: object

allOf:
  - if:
      properties:
        event:
          const: transcript.partial
    then:
      properties:
        data:
          type: object
          required: [text, speaker, is_final, start_time, end_time, confidence]
          properties:
            text:
              type: string
            speaker:
              type: string
              enum: [doctor, patient, unknown]
            is_final:
              type: boolean
              const: false
            start_time:
              type: number
              minimum: 0
            end_time:
              type: number
              minimum: 0
            confidence:
              type: number
              minimum: 0
              maximum: 1
          additionalProperties: false

  - if:
      properties:
        event:
          const: transcript.final
    then:
      properties:
        data:
          type: object
          required: [text, speaker, is_final, start_time, end_time, confidence]
          properties:
            text:
              type: string
            speaker:
              type: string
              enum: [doctor, patient, unknown]
            is_final:
              type: boolean
              const: true
            start_time:
              type: number
              minimum: 0
            end_time:
              type: number
              minimum: 0
            confidence:
              type: number
              minimum: 0
              maximum: 1
          additionalProperties: false

  - if:
      properties:
        event:
          const: session.status
    then:
      properties:
        data:
          type: object
          required: [status, message]
          properties:
            status:
              type: string
              enum: [connected, recording, processing, error]
            message:
              type: string
          additionalProperties: false

  - if:
      properties:
        event:
          const: session.warning
    then:
      properties:
        data:
          type: object
          required: [type, remaining_minutes, message]
          properties:
            type:
              type: string
              const: duration_limit_approaching
            remaining_minutes:
              type: integer
              minimum: 0
            message:
              type: string
          additionalProperties: false

  - if:
      properties:
        event:
          const: session.ended
    then:
      properties:
        data:
          type: object
          required: [reason, message]
          properties:
            reason:
              type: string
              enum: [duration_limit, grace_period_expired, manual]
            message:
              type: string
          additionalProperties: false

  - if:
      properties:
        event:
          const: server.pong
    then:
      properties:
        data:
          type: object
          required: [timestamp]
          properties:
            timestamp:
              type: string
              format: date-time
          additionalProperties: false

additionalProperties: false
